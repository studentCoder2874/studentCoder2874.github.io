<article class="project-card" data-tags="{{ include.project.tags | join: ',' | downcase }}">
  {% if include.project.image %}
  <div class="card-image">
    <img src="{{ include.project.image | relative_url }}" alt="{{ include.project.title }}" loading="lazy">
  </div>
  {% endif %}
  <div class="card-body">
    <div class="card-tags">
      {% for tag in include.project.tags %}
      <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
    <h3 class="card-title">{{ include.project.title }}</h3>
    <p class="card-description">{{ include.project.description }}</p>
    <div class="card-links">
      {% if include.project.link %}
      <a href="{{ include.project.link }}" target="_blank" rel="noopener noreferrer" class="btn btn-sm">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M10 6v2H5v11h11v-5h2v6a1 1 0 01-1 1H4a1 1 0 01-1-1V7a1 1 0 011-1h6zm11-3v8l-3.528-3.536-5.643 5.642-1.414-1.414 5.642-5.643L13 3h8z"/></svg>
        Live Demo
      </a>
      {% endif %}
      {% if include.project.github %}
      <a href="{{ include.project.github }}" target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-ghost">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
      {% endif %}
      <a href="{{ include.project.url | relative_url }}" class="btn btn-sm btn-ghost">Details &rarr;</a>
    </div>
  </div>
</article>
