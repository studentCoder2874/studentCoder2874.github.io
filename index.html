---
layout: default
title: Home
---

<section class="hero">
  <div class="hero-content">
    <p class="hero-greeting">Hi, my name is</p>
    <h1 class="hero-name">{{ site.author.name }}.</h1>
    <h2 class="hero-tagline">{{ site.tagline }}</h2>
    <p class="hero-description">{{ site.hero_description }}</p>
    <div class="hero-cta">
      <a href="{{ '/projects' | relative_url }}" class="btn btn-primary">View Projects</a>
      <a href="{{ '/contact' | relative_url }}" class="btn btn-ghost">Contact Me</a>
    </div>
  </div>
</section>
