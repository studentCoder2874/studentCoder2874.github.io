---
layout: default
---
<article class="project-article">
  <div class="container container-narrow">
    <header class="project-header fade-in">
      <div class="project-meta-top">
        <div class="card-tags">
          {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
        <div class="project-links-top">
          {% if page.link %}
          <a href="{{ page.link }}" target="_blank" rel="noopener noreferrer" class="btn btn-sm">Live Demo</a>
          {% endif %}
          {% if page.github %}
          <a href="{{ page.github }}" target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-ghost">GitHub</a>
          {% endif %}
        </div>
      </div>
      <h1 class="project-title">{{ page.title }}</h1>
      <p class="project-description">{{ page.description }}</p>
    </header>

    {% if page.image %}
    <div class="project-hero-image fade-in">
      <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" loading="lazy">
    </div>
    {% endif %}

    <div class="project-body fade-in">
      {{ content }}
    </div>

    <footer class="project-footer">
      <a href="{{ '/projects' | relative_url }}" class="btn btn-ghost">&larr; Back to Projects</a>
    </footer>
  </div>
</article>
